services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tecksign
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api-server:
    build: .
    command: pnpm --filter @workspace/api-server run dev
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://postgres:postgres@db:5432/tecksign
    ports:
      - "3001:3001"
    depends_on:
      - db
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store

  developer-center:
    build: .
    command: pnpm --filter @workspace/developer-center run dev
    environment:
      PORT: "5173"
      BASE_PATH: "/"
      API_PROXY_TARGET: http://api-server:3001
    ports:
      - "5173:5173"
    depends_on:
      - api-server
    volumes:
      - .:/app
      - devcenter_node_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store

volumes:
  db_data:
  api_node_modules:
  devcenter_node_modules:
  pnpm_store:

