packages:
  "swagger-ui-react": "For rendering the interactive API reference"
  "prism-react-renderer": "For syntax highlighting in code blocks"
  "framer-motion": "For smooth page transitions and interactive elements"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility function to efficiently merge Tailwind CSS classes"

notes:
  - App is forced to dark mode as per design requirements (#010810 background).
  - Primary color set to Teck Sign brand #FF7864.
  - Using Prompt and Days One Google Fonts.
  - Border radius is globally set to 0px for sharp corners.
