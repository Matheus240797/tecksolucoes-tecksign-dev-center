kind = "web"
previewPath = "/"
title = "Teck Sign Developer Center"
version = "1.0.0"
id = "artifacts/developer-center"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24059
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/developer-center run dev"

[services.env]
PORT = "24059"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/developer-center", "run", "build"]
publicDir = "artifacts/developer-center/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
